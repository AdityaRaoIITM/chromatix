<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYNCHRO - Music Sync</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        #overlay {
            color: white;
            text-align: center;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            border: 2px solid #333;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="margin-top:0;">TAP TO SYNC</h1>
        <p>Turn brightness to 100%.</p>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const body = document.body;
        
        let audioContext, analyser, dataArray;
        
        const bassHistory = [];
        const historySize = 20; 
        let currentBrightness = 0;

        overlay.addEventListener('click', async () => {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        autoGainControl: false,
                        noiseSuppression: false
                    } 
                });
                
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                
                // 1. HIGHER RESOLUTION: Narrower frequency buckets
                analyser.fftSize = 1024; 
                // 2. ZERO SMOOTHING: Reacts instantly to sharp drum hits, not sustained talking
                analyser.smoothingTimeConstant = 0.1; 
                
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                overlay.classList.add('hidden');
                draw();
            } catch (err) {
                alert("Microphone access is required.");
                console.error(err);
            }
        });

        function getBassEnergy() {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            
            // 3. PRECISION TARGETING:
            // With fftSize 1024, each bin is roughly 43Hz wide.
            // Bin 1: 43Hz - 86Hz (Sub-bass / Deep kick)
            // Bin 2: 86Hz - 129Hz (Punchy kick)
            // Bin 3: 129Hz - 172Hz (Upper bass)
            // By only scanning bins 1, 2, and 3, we completely ignore the 200Hz+ vocal range.
            for(let i = 1; i <= 3; i++) {
                sum += dataArray[i];
            }
            return sum / 3;
        }

        function draw() {
            requestAnimationFrame(draw);
            
            const bass = getBassEnergy();
            
            bassHistory.push(bass);
            if (bassHistory.length > historySize) {
                bassHistory.shift();
            }
            const avgBass = bassHistory.reduce((a, b) => a + b, 0) / bassHistory.length;

            // Trigger the light if the bass spikes sharply above the average background noise
            if (bass > avgBass * 1.25 && bass > 60) {
                currentBrightness = 100; 
            }

            currentBrightness = Math.max(0, currentBrightness - 5); // Fades out smoothly

            // Global time-synced color
            const hue = Math.floor(Date.now() / 100) % 360;
            const lightness = currentBrightness / 2;
            
            body.style.backgroundColor = `hsl(${hue}, 100%, ${lightness}%)`;
        }
    </script>
</body>
</html>
