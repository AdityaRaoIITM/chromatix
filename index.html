<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aditya Rao - SYNCHRO - Live</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            /* Removed the CSS transition to allow for instant, punchy strobe effects */
        }

        #overlay {
            color: white;
            text-align: center;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            border: 2px solid #333;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="margin-top:0;">TAP TO SYNC</h1>
        <p>Turn brightness to 100%.</p>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const body = document.body;
        
        let audioContext, analyser, dataArray;
        
        // Beat detection variables
        const bassHistory = [];
        const historySize = 20; 
        let currentBrightness = 0;

        overlay.addEventListener('click', async () => {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // CRITICAL FIX: Turn off audio processing so the mic hears raw concert dynamics
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        autoGainControl: false,
                        noiseSuppression: false
                    } 
                });
                
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                
                // Lower FFT size = faster response time for beat detection
                analyser.fftSize = 256; 
                source.connect(analyser);
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                overlay.classList.add('hidden');
                draw();
            } catch (err) {
                alert("Microphone access is required.");
                console.error(err);
            }
        });

        function getBassEnergy() {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            // Only look at the first 5 bins (roughly 0Hz to 400Hz) for the "kick"
            for(let i = 0; i < 5; i++) {
                sum += dataArray[i];
            }
            return sum / 5;
        }

        function draw() {
            requestAnimationFrame(draw);
            
            const bass = getBassEnergy();
            
            // 1. Maintain a rolling average of the background noise
            bassHistory.push(bass);
            if (bassHistory.length > historySize) {
                bassHistory.shift();
            }
            const avgBass = bassHistory.reduce((a, b) => a + b, 0) / bassHistory.length;

            // 2. BEAT DETECTION: If current bass is a sudden spike above the average
            if (bass > avgBass * 1.25 && bass > 100) {
                currentBrightness = 100; // Trigger full brightness
            }

            // 3. Smooth fade out (creates a pulsating effect rather than flickering)
            currentBrightness = Math.max(0, currentBrightness - 4);

            // 4. THE SYNC HACK: Use global time to determine the color.
            // Division by 100 means the color wheel completes a full rotation every 36 seconds.
            const hue = Math.floor(Date.now() / 100) % 360;

            // 5. Apply the color (Lightness scales from 0% [black] to 50% [pure vivid color])
            const lightness = currentBrightness / 2;
            body.style.backgroundColor = `hsl(${hue}, 100%, ${lightness}%)`;
        }
    </script>
</body>
</html>
