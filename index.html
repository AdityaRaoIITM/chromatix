<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aditya Rao - PARADOX'26 SYNCHRO - High Sensitivity</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
        }

        #overlay {
            color: white;
            text-align: center;
            z-index: 10;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            border: 2px solid #333;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="margin-top:0;">TAP TO SYNC</h1>
        <p>High Sensitivity Mode</p>
    </div>

    <script>
        const overlay = document.getElementById('overlay');
        const body = document.body;
        
        let audioContext, analyser, dataArray;
        
        const energyHistory = [];
        const historySize = 30; // Slightly larger history for a smoother rolling average
        let currentBrightness = 0;

        overlay.addEventListener('click', async () => {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: {
                        echoCancellation: false,
                        autoGainControl: false,
                        noiseSuppression: false
                    } 
                });
                
                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                
                analyser.fftSize = 1024; 
                analyser.smoothingTimeConstant = 0.1; 
                
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                
                overlay.classList.add('hidden');
                draw();
            } catch (err) {
                alert("Microphone access is required.");
                console.error(err);
            }
        });

        function getAudioEnergy() {
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            
            // 1. WIDENED SPECTRUM: 
            // We now loop through the first 200 bins instead of just 3.
            // This captures everything from 40Hz (deep bass) up to ~8.6kHz (cymbals, high synths).
            const maxBin = 200;
            for(let i = 1; i <= maxBin; i++) {
                sum += dataArray[i];
            }
            return sum / maxBin;
        }

        function draw() {
            requestAnimationFrame(draw);
            
            const energy = getAudioEnergy();
            
            energyHistory.push(energy);
            if (energyHistory.length > historySize) {
                energyHistory.shift();
            }
            const avgEnergy = energyHistory.reduce((a, b) => a + b, 0) / energyHistory.length;

            // 2. INCREASED SENSITIVITY:
            // Multiplier lowered from 1.25 to 1.05 (reacts to tiny changes in volume).
            // Hard threshold lowered from 60 to 15 (picks up much quieter sounds).
            if (energy > avgEnergy * 1.05 && energy > 15) {
                // Brightness now scales based on how loud the sound is, capping at 100
                currentBrightness = Math.min(100, energy * 2.5); 
            }

            // 3. SLOWER FADE:
            // Fades out slower (subtracts 2 instead of 5) so the screen stays lit up longer 
            // during continuous sections of music like guitar solos or vocal runs.
            currentBrightness = Math.max(0, currentBrightness - 2); 

            // Global time-synced color remains the same
            const hue = Math.floor(Date.now() / 100) % 360;
            const lightness = currentBrightness / 2;
            
            body.style.backgroundColor = `hsl(${hue}, 100%, ${lightness}%)`;
        }
    </script>
</body>
</html>
